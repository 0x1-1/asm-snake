name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: asm-snake-windows-x64
          path: build/asm-snake.exe
